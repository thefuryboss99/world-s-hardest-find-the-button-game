        let displaybutton = () => {
            const button = document.querySelector('.Button');
            button.style.display = 'block';
        };
(function() {
    const player = document.getElementById('Player');
    let ctx = player.getContext('2d');

        // set the canvas size to fill the window
    player.width = window.innerWidth;
    player.height = window.innerHeight;

        // Rectangle properties
    let rectX = 0;
    let rectY = player.height / 2 - 25;
    const rectWidth = 25;
    const rectHeight = 25;
    const speed = 2; // pixels per frame

        function animate() {
            ctx.clearRect(0, 0, player.width, player.height);
            ctx.fillStyle = 'red';
            ctx.fillRect(rectX, rectY, rectWidth, rectHeight);
            // makes it move
            rectX += speed;
            if (rectX > player.width) {
                rectX = -rectWidth;
            }

            requestAnimationFrame(animate);
        }
        // start the animation
        animate();
        window.addEventListener('keydown', (event) => {
            if (event.key === " ") {
                rectY -= 50; 
                setTimeout(() => {
                    rectY += 50;
                }, 400);
            }
        });
        setInterval(() => {
            if (rectX + rectWidth >= player.width) {
                displaybutton();
            }
        }, 100)

        const x2 = 20, y2 = 5;  // Second point
        const x3 = 30, y3 = 20; // Third point

        // Begin a new path for the triangle
        spikectx.beginPath();
        spikectx.moveTo(x1, y1); // Move to first point
        spikectx.lineTo(x2, y2); // Draw line to second point
        spikectx.lineTo(x3, y3); // Draw line to third point
        spikectx.closePath();    // Close the path back to first point

        // Fill the triangle
        spikectx.fillStyle = "#000000"; // Black fill
